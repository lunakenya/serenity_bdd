serenity {
  project.name = "Demoblaze E2E - Serenity BDD"
  take.screenshots = FOR_EACH_ACTION
  reports.show.step.details = true
}

webdriver {
  driver = chrome
  base.url = "https://www.demoblaze.com"
  timeouts {
    implicitlywait = 5000
    fluentWait = 10000
  }
  capabilities {
    browserName = "chrome"
    "goog:chromeOptions" {
      args = [
        "--no-sandbox",
        "--disable-dev-shm-usage",
        "--disable-gpu",
        "--window-size=1920,1080",
        "--disable-extensions",
        "--remote-allow-origins=*",
        # Silencia la advertencia de CDP cuando la versión de Chrome
        # es más nueva que la implementación CDP incluida en Selenium.
        # No afecta la funcionalidad ya que no se usan features CDP.
        "--remote-debugging-port=0"
      ]
    }
  }
}

environments {
  default {
    webdriver.base.url = "https://www.demoblaze.com"
  }
}

# Controla si Chrome se ejecuta en modo headless.
# Por defecto: true (sin interfaz gráfica).
# Para ejecutar con navegador visible: mvn clean verify -Dheadless.mode=false
#
# NOTA TÉCNICA: no se usa sustitución HOCON (${?headless.mode}) porque
# Serenity 4.2.9 no puede resolver ConfigDelayedMerge sobre una propiedad
# del mismo nombre, generando un WARNING inofensivo pero evitable.
# El valor se sobrescribe directamente via system property de Maven Failsafe.
headless.mode = true
